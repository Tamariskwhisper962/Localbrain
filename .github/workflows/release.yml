name: Release

# 태그 push(v*) 시 PyPI 에 publish. PyPI Trusted Publishing(OIDC) 사용 — API 토큰 불필요.
# 사전 설정: PyPI 프로젝트 → Publishing → GitHub Actions(이 repo, release.yml, environment: pypi) 등록.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # Trusted Publishing (OIDC)
      contents: read    # checkout 용 — job-level permissions 는 기본값을 '대체'하므로 명시 필요
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
